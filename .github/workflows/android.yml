name: Sync Upstream & Build Android Binaries (CGO=0 & CGO=1)

on:
  schedule:
    - cron: '0 0 * * *' # Daily auto sync + build + nightly release
  workflow_dispatch: # Manual run: build + nightly release
  push:
    tags:
      - 'v*-android*' # Stable Android release when pushing version tag

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with Upstream
        run: |
          git remote add upstream https://github.com/router-for-me/cliproxyapi.git || true
          git fetch upstream
          git checkout main
          git merge upstream/main --allow-unrelated-histories --no-edit || echo "Merge conflict? Resolve manually if needed."
          git push origin main || echo "Push skipped if no changes"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go Mod Tidy & Download
        run: |
          go mod tidy
          go mod download

      - name: Build Android arm64 - CGO=0
        run: |
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 \
            go build -v -trimpath -ldflags="-s -w" \
            -o cli-proxy-api-no-cgo \
            ./cmd/server

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27d

      - name: Build Android arm64 - CGO=1
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CC: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android35-clang
          CXX: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android35-clang++
        run: |
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
            go build -v -trimpath -ldflags="-s -w" \
            -o cli-proxy-api-cgo \
            ./cmd/server

      - name: Generate SHA256
        run: |
          sha256sum cli-proxy-api-no-cgo | awk '{print $1}' > cli-proxy-api-no-cgo.sha256
          sha256sum cli-proxy-api-cgo | awk '{print $1}' > cli-proxy-api-cgo.sha256

      - name: Verify Binaries
        run: |
          file cli-proxy-api-no-cgo || true
          file cli-proxy-api-cgo || true
          ls -lh cli-proxy-api-* *.sha256
          echo "CGO=0 size: $(du -h cli-proxy-api-no-cgo | cut -f1)"
          echo "CGO=1 size: $(du -h cli-proxy-api-cgo | cut -f1)"

      - name: Upload Artifacts (for debug/history)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: android-binaries-${{ github.run_number }}
          path: |
            cli-proxy-api-no-cgo
            cli-proxy-api-cgo
            cli-proxy-api-no-cgo.sha256
            cli-proxy-api-cgo.sha256
          retention-days: 14

      - name: Create/Update Nightly Android Release
        if: github.ref_type != 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-android
          name: CLI Proxy API nightly-android
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body: |
            Auto nightly Android build from workflow run #${{ github.run_number }}.
            Source SHA: ${{ github.sha }}
          files: |
            cli-proxy-api-no-cgo
            cli-proxy-api-cgo
            cli-proxy-api-no-cgo.sha256
            cli-proxy-api-cgo.sha256

      - name: Create GitHub Release with Binaries (Stable Tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CLI Proxy API ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            cli-proxy-api-no-cgo
            cli-proxy-api-cgo
            cli-proxy-api-no-cgo.sha256
            cli-proxy-api-cgo.sha256
