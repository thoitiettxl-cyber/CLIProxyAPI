name: Build Android Binaries from Upstream Tag

on:
  schedule:
    - cron: '0 0 * * *' # Daily: detect latest upstream v* tag and build if missing in fork
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional upstream tag to build (example: v6.8.51)'
        required: false
        type: string
  push:
    tags:
      - 'v*' # Build when a v* tag is pushed directly to fork

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      target_tag: ${{ steps.pick.outputs.target_tag }}
      should_build: ${{ steps.pick.outputs.should_build }}
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pick target tag
        id: pick
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git 2>/dev/null || true
          git fetch --tags upstream
          git fetch --tags origin

          TARGET=""

          if [ -n "${INPUT_TAG:-}" ]; then
            TARGET="$INPUT_TAG"
          elif [ "$EVENT_NAME" = "push" ]; then
            TARGET="$REF_NAME"
          else
            TARGET="$(git tag -l 'v*' --sort=-version:refname | head -n1)"
          fi

          if [ -z "$TARGET" ]; then
            echo "No target tag found." >&2
            echo "target_tag=" >> "$GITHUB_OUTPUT"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git rev-parse -q --verify "refs/tags/$TARGET" >/dev/null; then
            echo "Tag not found locally after fetch: $TARGET" >&2
            echo "target_tag=$TARGET" >> "$GITHUB_OUTPUT"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SHOULD_BUILD="true"

          # For schedule/manual mode: skip when release tag already exists in fork.
          if [ "$EVENT_NAME" != "push" ]; then
            if git ls-remote --tags origin "refs/tags/$TARGET" | grep -q "$TARGET"; then
              SHOULD_BUILD="false"
            fi
          fi

          echo "target_tag=$TARGET" >> "$GITHUB_OUTPUT"
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"

          echo "Resolved target tag: $TARGET"
          echo "Should build: $SHOULD_BUILD"

  build-and-release:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.should_build == 'true' && needs.resolve-tag.outputs.target_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TARGET_TAG: ${{ needs.resolve-tag.outputs.target_tag }}
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch and checkout target tag
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git 2>/dev/null || true
          git fetch --tags upstream
          git fetch --tags origin

          if git rev-parse -q --verify "refs/tags/$TARGET_TAG" >/dev/null; then
            git checkout -f "refs/tags/$TARGET_TAG"
          else
            echo "Target tag not found: $TARGET_TAG" >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go Mod Tidy & Download
        run: |
          go mod tidy
          go mod download

      - name: Build Android arm64 - CGO=0
        run: |
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 \
            go build -v -trimpath -ldflags="-s -w" \
            -o cli-proxy-api-no-cgo \
            ./cmd/server

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27d

      - name: Build Android arm64 - CGO=1
        env:
          CC: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android35-clang
          CXX: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android35-clang++
        run: |
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
            go build -v -trimpath -ldflags="-s -w" \
            -o cli-proxy-api-cgo \
            ./cmd/server

      - name: Generate SHA256
        run: |
          sha256sum cli-proxy-api-no-cgo | awk '{print $1}' > cli-proxy-api-no-cgo.sha256
          sha256sum cli-proxy-api-cgo | awk '{print $1}' > cli-proxy-api-cgo.sha256

      - name: Verify binaries
        run: |
          file cli-proxy-api-no-cgo || true
          file cli-proxy-api-cgo || true
          ls -lh cli-proxy-api-* *.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-binaries-${{ env.TARGET_TAG }}
          path: |
            cli-proxy-api-no-cgo
            cli-proxy-api-cgo
            cli-proxy-api-no-cgo.sha256
            cli-proxy-api-cgo.sha256
          retention-days: 14

      - name: Create GitHub release (tag)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TARGET_TAG }}
          name: CLI Proxy API ${{ env.TARGET_TAG }}
          generate_release_notes: true
          files: |
            cli-proxy-api-no-cgo
            cli-proxy-api-cgo
            cli-proxy-api-no-cgo.sha256
            cli-proxy-api-cgo.sha256
